<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title></title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 101%;
    background-color: #ffffff;
    overflow-x: hidden;
  }
</style>
</head>
<body>
<script>
  // Nudges a tiny scroll after load, which prompts most mobile browsers
  // to auto-hide their address bar. Browsers do not allow hiding it
  // immediately on open, for security reasons.
  window.addEventListener('load', function () {
    setTimeout(function () {
      window.scrollTo(0, 1);
    }, 50);
  });
</script>
</body>
</html>
